services:
  - type: web
    name: github-profile-analyzer-api
    env: node
    rootDir: analyzer-api-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: '*'
      - key: API_SECRET_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
        # Set your GitHub PAT in the Render dashboard
        # https://github.com/settings/tokens (no scopes needed for public data)
      - key: DATABASE_URL
        sync: false
        # Provide your external MySQL 8 connection string in the Render dashboard:
        # Format: mysql://USER:PASSWORD@HOST:PORT/DBNAME
        # Free MySQL providers: Railway (railway.app), Aiven (aiven.io), TiDB Serverless
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
