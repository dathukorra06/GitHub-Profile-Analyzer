services:
  - type: web
    name: github-profile-analyzer-api
    env: node
    rootDir: analyzer-api-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: '*' # Update this to your Vercel URL once deployed
      - key: API_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: github-analyzer-db
          property: connectionString

databases:
  - name: github-analyzer-db
    plan: free
    postgresMajorVersion: 15
