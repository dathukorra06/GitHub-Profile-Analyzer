databases:
  - name: github-analyzer-db
    plan: free
    databaseName: github_analyzer
    user: analyzer_user
    postgresMajorVersion: "15"

services:
  - type: web
    name: github-profile-analyzer-api
    env: node
    rootDir: analyzer-api-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: github-analyzer-db
          property: connectionString
      - key: CORS_ORIGIN
        value: '*'
      - key: API_SECRET_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
        # Set your GitHub PAT in the Render dashboard
        # https://github.com/settings/tokens (no scopes needed for public data)
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
