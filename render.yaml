services:
  - type: web
    name: github-profile-analyzer-api
    env: node
    rootDir: analyzer-api-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: '*' # Update this to your Vercel URL once deployed
      - key: API_KEY
        generateValue: true
      - key: GITHUB_TOKEN
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: github_analyzer
      - key: DB_PORT
        value: 3306
